services:
    portatec:
        image: portatec
        dns:
            - 9.9.9.9
            - 8.8.8.8
        build:
            context: ./
            dockerfile: ./docker/prod/Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            # - '${APP_PORT:-80}:80'
            # - '${HTTPS_PORT:-443}:443'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
            # - '${REVERB_PORT:-8080}:${REVERB_PORT:-8080}'
        environment:
            WWWUSER: '${WWWUSER}'
        volumes:
            - './.env:/var/www/.env'
            - './database.sqlite:/var/www/database/database.sqlite'
            - './storage:/var/www/storage'
        networks:
            - medeirostec-network
        depends_on:
            - redis
        restart: always


    redis:
        image: 'redis:alpine'
        volumes:
            - 'portatec-redis:/data'
        networks:
            - medeirostec-network
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s
        restart: always

    mosquitto:
        image: eclipse-mosquitto:2
        volumes:
            - './docker/prod/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf'
            - './docker/prod/mosquitto/auth/passwd:/mosquitto/config/passwd'
            - 'portatec-mosquitto-data:/mosquitto/data'
            - 'portatec-mosquitto-log:/mosquitto/log'
        ports:
            - '1883:1883'
            - '9001:9001'
        networks:
            - medeirostec-network
        restart: always

networks:
  medeirostec-network:
      external: true
      name: medeirostec-network
      driver: bridge

volumes:
    portatec-redis:
        driver: local
    portatec-mosquitto-data:
        driver: local
    portatec-mosquitto-log:
        driver: local
